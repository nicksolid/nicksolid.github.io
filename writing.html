<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Writing &middot; Dickson Li</title>
    <meta name="description" content="Cloud Operator and other writing by Dickson Li.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="wrapper">
        <div class="navbar container" id="nav-mount"></div>
        <div style="clear:both"></div>
        <hr>
        <div class="container content">

            <h2>Writing</h2>

            <p>
                I write
                <a href="https://cloudoperator.substack.com" target="_blank" rel="noopener">Cloud Operator</a>
                &ndash; an operator&rsquo;s view of Cloud and AI in Asia Pacific. Biweekly, public sources only.
                Latest posts below.
            </p>

            <ul class="writing-list" id="posts-mount">
                <li>Loading latest posts&hellip;</li>
            </ul>

            <p style="text-align: center; margin: 24px 0 36px 0;">
                <a id="substack-link" href="https://cloudoperator.substack.com" target="_blank" rel="noopener">View all posts on Substack &rarr;</a>
            </p>

            <hr>

            <h3 style="margin-top: 32px;">Subscribe</h3>
            <p style="color: #555;">
                Drop your email below to get new posts straight to your inbox.
            </p>

            <div class="subscribe-cta">
                <iframe src="https://cloudoperator.substack.com/embed"
                        width="100%" height="320"
                        style="border: 1px solid #eee; background: white; display: block; max-width: 480px; margin: 0 auto;"
                        frameborder="0" scrolling="no"></iframe>
            </div>

            <div id="footer-mount"></div>
        </div>
    </div>
    <script src="js/site.js"></script>
    <script src="js/writing.js"></script>
    <script>
        renderChrome("writing");
        loadSubstackFeed({
            substackUrl: "https://cloudoperator.substack.com",
            mount:   document.getElementById("posts-mount"),
            linkEl:  document.getElementById("substack-link"),
            limit:   5
        });
    </script>
</body>
</html>
